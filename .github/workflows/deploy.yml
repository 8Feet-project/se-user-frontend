name: Frontend CD

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main
      environment:
        description: Target GitHub environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      publish_image:
        description: Build and push image to GHCR
        required: true
        default: true
        type: boolean
      deploy_ssh:
        description: Deploy on the configured SSH host
        required: true
        default: true
        type: boolean
      smoke_url:
        description: Public URL for smoke check
        required: false
        default: http://8feet.meteor041.com/

concurrency:
  group: frontend-cd-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/8feet-frontend

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image version
        id: version
        run: echo "sha_short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: ${{ inputs.publish_image }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        if: ${{ inputs.publish_image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.sha_short }}
            ${{ env.IMAGE_NAME }}:${{ inputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        if: ${{ inputs.deploy_ssh }}
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_SSH_KEY}"
          test -n "${DEPLOY_SSH_HOST}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${DEPLOY_SSH_KEY}" > ~/.ssh/8feet_frontend_deploy_key
          chmod 600 ~/.ssh/8feet_frontend_deploy_key
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "${DEPLOY_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        if: ${{ inputs.deploy_ssh }}
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_REF: ${{ inputs.ref }}
          SMOKE_URL: ${{ inputs.smoke_url }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_SSH_HOST}"
          test -n "${DEPLOY_SSH_USER}"
          test -n "${DEPLOY_APP_DIR}"
          ssh -i ~/.ssh/8feet_frontend_deploy_key \
            -p "${DEPLOY_SSH_PORT:-22}" \
            "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}" \
            "DEPLOY_APP_DIR='${DEPLOY_APP_DIR}' DEPLOY_REF='${DEPLOY_REF}' SMOKE_URL='${SMOKE_URL}' bash -s" <<'REMOTE_DEPLOY'
          set -euo pipefail
          cd "${DEPLOY_APP_DIR}"
          git fetch --tags origin
          git checkout "${DEPLOY_REF}"
          if git show-ref --verify --quiet "refs/remotes/origin/${DEPLOY_REF}"; then
            git pull --ff-only origin "${DEPLOY_REF}"
          fi
          if [ -f docker-compose.yml ] || [ -f compose.yml ]; then
            docker compose up -d --build
            docker compose ps
          else
            docker build -t 8feet-frontend:latest .
            docker rm -f 8feet-frontend || true
            docker run -d --name 8feet-frontend --restart unless-stopped -p 80:80 8feet-frontend:latest
          fi
          curl -fsS "${SMOKE_URL}"
          REMOTE_DEPLOY
